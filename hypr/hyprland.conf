############### HYPRLAND CONFIG ###############
source = ~/.config/hypr/colors.conf

################
### MONITORS ###
################
monitor=,1920x1080@60,0x0,1

###################
### MY PROGRAMS ###
###################
$terminal = wezterm
$fileManager = yazi
$menu = rofi -show drun

#################
### AUTOSTART ###
#################
exec-once = waybar
exec-once = hypridle
exec-once = swww-daemon
exec-once = swaync
exec-once = dunst
exec-once = hyprpm reload -n

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_THEME,Polarnight
env = XCURSOR_SIZE,15
env = HYPRCURSOR_SIZE,15

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 3
    gaps_out = 10
    border_size = 3

    col.active_border = $accent rgb(4b0082) 45deg
    col.inactive_border = rgb(3d0404) rgb(4d2b00) 45deg 

    resize_on_border = false
    allow_tearing = false
    layout = scrolling
}

plugin {
    hyprscrolling {
        column_width = 0.75
        fullscreen_on_one_column = true
        direction = right
    }
}

decoration {
    rounding = 12
    
    active_opacity = 0.75
    inactive_opacity = 0.65

    blur {
        enabled = true
        size = 7
        passes = 4
        new_optimizations = true
        ignore_opacity = true
        
        noise = 0.02
        contrast = 0.9
        brightness = 1.0
        vibrancy = 0.2
        vibrancy_darkness = 0.2
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000044) 
    }
}

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule = suppressevent maximize, class:.*
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# layerrule = blur, waybar
layerrule = noanim, waybar
layerrule = noanim, hyprshot
# layerrule = blur, rofi
layerrule = noanim, selection
layerrule = noanim, hyprshot
windowrulev2 = noanim, class:^(slurp)$
windowrulev2 = noshadow, class:^(slurp)$

windowrulev2 = animation popin 10%, class:^(rofi)$
windowrulev2 = stayfocused, class:^(rofi)$
windowrulev2 = float, class:^(rofi)$

##################
### ANIMATIONS ###
##################
# animations {
#     enabled = yes
#     bezier = smooth, 0.25, 1, 0.5, 1
#     bezier = standard, 0.4, 0, 0.2, 1
#     bezier = linear, 0, 0, 1, 1
#
#     animation = windowsIn, 1, 15, smooth, slide bottom
#     animation = windowsOut, 1, 7, linear, slide bottom
#     animation = layers, 1, 7, smooth, popin 10%
#     animation = workspaces, 1, 5, almostLinear, fade
# }

animations {
    enabled = yes, please :)

    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     10,     easeOutQuint, popin 87%
    animation = windowsOut,    1,     10,     easeOutQuint, popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     3.5,   linear, slidevert
    animation = zoomFactor,    1,     7,     quick
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_hyprland_qtutils_check = true
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_options = caps:swapescape 
    follow_mouse = 1
    sensitivity = 0 

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod, A, exec, flatpak run app.zen_browser.zen
bind = $mainMod SHIFT, A, exec, firefox --private-window
bind = $mainMod, E, exec, wezterm start -- yazi
bind = $mainMod, S, exec, ~/.config/rofi/hyprlayout.sh

bind = $mainMod, X, killactive
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, V, togglefloating
bind = $mainMod SHIFT, P, pseudo
bind = $mainMod SHIFT, J, togglesplit

bind = $mainMod, Q, exec, ~/.config/rofi/powermenu.sh
bind = , Print, exec, ~/.config/rofi/screenshot.sh

bind = $mainMod, Up, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bind = $mainMod, Down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = $mainMod SHIFT, Up, exec, brightnessctl set +5%
bind = $mainMod SHIFT, Down, exec, brightnessctl set 5%-

bind = $mainMod, W, exec, ~/.config/hypr/swww-rofi-preview.sh
bind = $mainMod, Period, exec, rofimoji
bind = $mainMod, I, exec, hyprpicker -a
bind = $mainMod, R, exec, hyprctl reload

bind = $mainMod, grave, togglespecialworkspace, scratch
bind = $mainMod SHIFT, grave, movetoworkspace, special:scratch

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
